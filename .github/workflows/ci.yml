name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install lint deps
        run: pip install ruff

      - name: AST parse
        run: python -c "import ast; ast.parse(open('app/main.py', encoding='utf-8').read()); print('main.py syntax OK')"

      - name: Ruff lint
        run: ruff check app/ --select=E,F,W --ignore=E501,F401

      - name: Validate struct (mock SDL2)
        run: |
          pip install Pillow pyte
          python -c "
          src = open('app/main.py', encoding='utf-8').read()
          assert 'class HistoryScreen' in src, 'HistoryScreen musi być'
          assert 'pyte' in src, 'pyte import wymagany'
          assert 'pty' in src, 'pty import wymagany'
          print('struct OK')
          "

  lint-bash:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Shellcheck launcher
        run: shellcheck app/AnberCC.sh

      - name: Shellcheck installer
        run: shellcheck scripts/install.sh

      - name: Bash syntax test
        run: |
          bash -n app/AnberCC.sh
          bash -n scripts/install.sh
